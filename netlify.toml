# Configuration Netlify optimisée pour Eagle Production

[build]
  # Commande de build unique qui fait tout
  command = "npm run build"
  # Dossier de sortie
  publish = "dist"
  # Timeout augmenté pour les builds SEO
  timeout = "600s"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

# Headers pour performance et SEO
[[headers]]
  for = "/*"
  [headers.values]
    # Sécurité
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    
    # Performance
    Cache-Control = "public, max-age=31536000, immutable"
    
    # SEO
    X-Robots-Tag = "index, follow"

# Headers pour HTML (pages dynamiques)
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Robots-Tag = "index, follow"

# Headers pour assets statiques
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers pour images
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers pour JSON (schemas)
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
    Content-Type = "application/json"

# Redirections SEO
[[redirects]]
  from = "/blog/*"
  to = "/blog/:splat"
  status = 200

[[redirects]]
  from = "/faq/*"
  to = "/faq/:splat"
  status = 200

# Redirection www vers non-www (SEO)
[[redirects]]
  from = "https://www.eagle-prod.com"
  to = "https://eagle-prod.com"
  status = 301
  force = true

# Redirection HTTP vers HTTPS
[[redirects]]
  from = "http://eagle-prod.com"
  to = "https://eagle-prod.com"
  status = 301
  force = true

# Pages d'erreur personnalisées
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Compression Brotli
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true
